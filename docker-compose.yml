services:
  postgres:
    image: postgres:16
    container_name: auth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2
    container_name: auth_postgres-redis
    ports:
      - '6379:6379'
    command: >
      redis-server
      --appendonly yes
      --save 60 1000
    volumes:
      - redis_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: auth_postgres-mailhog
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI — http://localhost:8025

volumes:
  redis_data:
  auth_pg_data: