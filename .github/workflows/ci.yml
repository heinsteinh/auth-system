name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d auth_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: api

    env:
      NODE_ENV: test
      PORT: '4001'
      DATABASE_URL: postgresql://test:test@localhost:5432/auth_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-must-be-at-least-32-chars-long
      JWT_REFRESH_SECRET: ci-refresh-secret-must-be-at-least-32-chars-long
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL_DAYS: '7'
      APP_URL: http://localhost:4001
      FRONTEND_URL: http://localhost:5173
      SMTP_HOST: localhost
      SMTP_PORT: '1025'
      SMTP_FROM: 'CI <ci@example.com>'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Type-check + build
        run: pnpm build

      - name: Run tests (unit + integration + e2e)
        run: pnpm test

  frontend:
    name: frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
